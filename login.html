<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>πφe — Acceso</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#000;min-height:100vh;min-height:100dvh;
            font-family:-apple-system,BlinkMacSystemFont,'SF Mono','Monaco','Consolas',monospace;
            display:flex;align-items:center;justify-content:center;
            color:#e0e0e0;padding:20px;overflow:hidden;
        }
        canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
        .box{
            position:relative;z-index:1;
            background:rgba(10,10,15,0.9);border:1px solid #1a1a2e;border-radius:12px;
            padding:36px 28px;width:100%;max-width:340px;text-align:center;
            backdrop-filter:blur(20px);
        }
        .logo{font-size:2.2em;margin-bottom:6px}
        .brand{font-size:1.1em;font-weight:700;color:#f59e0b;letter-spacing:1px;margin-bottom:4px}
        .sub{font-size:0.75em;color:#555;margin-bottom:24px}
        input{
            display:block;width:100%;padding:13px 16px;
            background:#0c0c14;border:1px solid #1e1e2e;border-radius:8px;
            color:#e0e0e0;font-family:inherit;font-size:15px;
            margin-bottom:12px;outline:none;-webkit-appearance:none;
            transition:border-color .2s;
        }
        input:focus{border-color:#f59e0b}
        input::placeholder{color:#444}
        button{
            display:block;width:100%;padding:13px;margin-top:4px;
            background:linear-gradient(135deg,#f59e0b,#f97316);
            border:none;border-radius:8px;color:#000;font-weight:700;
            font-size:1em;cursor:pointer;-webkit-appearance:none;
            touch-action:manipulation;transition:opacity .2s,transform .1s;
        }
        button:hover{opacity:0.92}
        button:active{transform:scale(0.98)}
        button:disabled{opacity:0.5;cursor:wait}
        .err{color:#ef4444;font-size:0.78em;margin-top:14px;min-height:20px}
        .footer{position:fixed;bottom:16px;left:0;right:0;text-align:center;
            font-size:0.65em;color:#333;z-index:1}
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <div class="box">
        <div class="logo">🦁</div>
        <div class="brand">πφe</div>
        <p class="sub">Command Center — Acceso Seguro</p>
        <form id="form">
            <input type="text" name="username" id="user" placeholder="Usuario" autocomplete="username" autocapitalize="none" required>
            <input type="password" name="password" id="pass" placeholder="Contraseña" autocomplete="current-password" required>
            <button type="submit" id="btn">Acceder</button>
        </form>
        <div class="err" id="err"></div>
    </div>
    <div class="footer">πφe Energy 2026 · DGX Sparks</div>

    <script>
    // Star field
    (function(){
        const c=document.getElementById('stars'),x=c.getContext('2d');
        let w,h,s=[];
        function r(){w=c.width=innerWidth;h=c.height=innerHeight;s=[];
            for(let i=0;i<150;i++)s.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+0.3,a:Math.random(),d:Math.random()*0.015+0.003})}
        function d(){x.clearRect(0,0,w,h);s.forEach(p=>{
            p.a+=p.d;if(p.a>1)p.d=-Math.abs(p.d);if(p.a<0.1)p.d=Math.abs(p.d);
            x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle=`rgba(255,255,255,${p.a*0.5})`;x.fill()});
            requestAnimationFrame(d)}
        r();d();addEventListener('resize',r);
    })();

    // Login
    const form=document.getElementById('form'),btn=document.getElementById('btn'),err=document.getElementById('err');
    form.addEventListener('submit',async e=>{
        e.preventDefault();
        err.textContent='';
        const u=document.getElementById('user').value.trim();
        const p=document.getElementById('pass').value;
        if(!u||!p)return;
        btn.disabled=true;btn.textContent='Verificando...';
        try{
            const res=await fetch('/api/login',{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({username:u,password:p})
            });
            if(res.ok){
                btn.textContent='✓ Bienvenido';
                setTimeout(()=>{window.location.href='/';},600);
            }else if(res.status===429){
                err.textContent='Demasiados intentos. Espera 15 minutos.';
                btn.disabled=false;btn.textContent='Acceder';
            }else{
                err.textContent='Usuario o contraseña incorrectos';
                btn.disabled=false;btn.textContent='Acceder';
            }
        }catch(e){
            err.textContent='Error de conexión';
            btn.disabled=false;btn.textContent='Acceder';
        }
    });
    </script>
</body>
</html>
