<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>πφe - Acceso al Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Animated Star Field Background */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid rgba(245, 158, 11, 0.5);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(245, 158, 11, 0.3);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 1rem;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.8));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 30px rgba(245, 158, 11, 1));
            }
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b 0%, #ec4899 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.2rem;
            text-transform: uppercase;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            font-weight: 600;
        }

        .form-input {
            padding: 1rem 1.5rem;
            background: rgba(20, 20, 20, 0.6);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-input:focus {
            border-color: #f59e0b;
            background: rgba(20, 20, 20, 0.8);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #ec4899 100%);
            color: #fff;
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(20, 20, 20, 0.6);
            color: #f59e0b;
            border: 2px solid #f59e0b;
        }

        .btn-secondary:hover {
            background: rgba(245, 158, 11, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        /* Footer */
        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .login-footer a {
            color: #f59e0b;
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: #ec4899;
        }

        /* Security Badge */
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(20, 184, 166, 0.5);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            color: #14b8a6;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .security-icon {
            font-size: 1.2rem;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 2rem 1.5rem;
                width: 95%;
            }

            .logo-icon {
                font-size: 4rem;
            }

            .logo-text {
                font-size: 2rem;
                letter-spacing: 0.2rem;
            }

            .logo-subtitle {
                font-size: 0.75rem;
            }

            .form-input {
                padding: 0.875rem 1.25rem;
            }

            .btn {
                padding: 0.875rem 1.5rem;
                font-size: 0.9rem;
            }

            .security-badge {
                bottom: 10px;
                right: 10px;
                padding: 0.5rem 0.75rem;
                font-size: 0.7rem;
            }
        }

        /* Loading animation */
        .btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn.loading span::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-left: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Star Field Canvas -->
    <canvas id="starfield"></canvas>

    <!-- Login Container -->
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🦁</div>
            <div class="logo-text">πφe</div>
            <div class="logo-subtitle">Command Center</div>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    class="form-input" 
                    placeholder="nombre@piphienergy.com"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Acceder</span>
                </button>
                <button type="button" class="btn btn-secondary" id="vipBtn">
                    <span>✨ Acceso VIP</span>
                </button>
            </div>
        </form>

        <div class="login-footer">
            <p>Cyberpunk Space Command Center V2</p>
            <p style="margin-top: 0.5rem;">
                © 2026 πφe Energy · <a href="#">Ayuda</a> · <a href="#">Privacidad</a>
            </p>
        </div>
    </div>

    <!-- Security Badge -->
    <div class="security-badge">
        <span class="security-icon">🛡️</span>
        <span>Conexión Segura</span>
    </div>

    <!-- Star Field Animation Script -->
    <script>
        // ==================== STAR FIELD ====================
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * canvas.width;
                this.size = (1 - this.z / canvas.width) * 2;
                
                // Colorful stars
                const colorChoice = Math.random();
                if (colorChoice < 0.6) {
                    this.color = '#ffffff';
                } else if (colorChoice < 0.8) {
                    this.color = '#3b82f6'; // Blue
                } else if (colorChoice < 0.9) {
                    this.color = '#f59e0b'; // Gold
                } else {
                    this.color = '#ec4899'; // Pink
                }
            }

            update(speed) {
                this.z -= speed;
                if (this.z <= 0) {
                    this.reset();
                    this.z = canvas.width;
                }

                this.size = (1 - this.z / canvas.width) * 2;
                this.x += (this.x - canvas.width / 2) * (speed / this.z) * 0.2;
                this.y += (this.y - canvas.height / 2) * (speed / this.z) * 0.2;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect for larger stars
                if (this.size > 1.5) {
                    ctx.fillStyle = this.color.replace(')', ', 0.3)').replace('#', 'rgba(').replace(/(..)(..)(..)/, '$1,$2,$3');
                    if (ctx.fillStyle === this.color) {
                        // Fallback for hex colors
                        ctx.fillStyle = this.color + '4d';
                    }
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Create stars
        const stars = Array.from({ length: 300 }, () => new Star());
        let speed = 0.5;
        let targetSpeed = 0.5;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Smooth speed transition
            speed += (targetSpeed - speed) * 0.1;

            stars.forEach(star => {
                star.update(speed);
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Speed up on hover
        canvas.addEventListener('mousemove', (e) => {
            const distanceFromCenter = Math.sqrt(
                Math.pow(e.clientX - canvas.width / 2, 2) + 
                Math.pow(e.clientY - canvas.height / 2, 2)
            );
            targetSpeed = 0.5 + (distanceFromCenter / canvas.width) * 2;
        });

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ==================== LOGIN FORM ====================
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const vipBtn = document.getElementById('vipBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Real API login
        async function doLogin(username, password, redirect) {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (res.ok && data.ok) {
                return {ok: true, role: data.role};
            }
            return {ok: false};
        }

        // Form submission - Normal login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            if (!username || !password) {
                showNotification('Por favor, completa todos los campos', 'error');
                return;
            }
            loginBtn.classList.add('loading');
            loginBtn.querySelector('span').textContent = 'Verificando';
            try {
                const result = await doLogin(username, password);
                if (result.ok) {
                    showNotification('¡Acceso concedido! Redirigiendo...', 'success');
                    targetSpeed = 5;
                    setTimeout(() => { window.location.href = '/'; }, 1200);
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.querySelector('span').textContent = 'Acceder';
                    showNotification('Credenciales inválidas', 'error');
                }
            } catch(e) {
                loginBtn.classList.remove('loading');
                loginBtn.querySelector('span').textContent = 'Acceder';
                showNotification('Error de conexión', 'error');
            }
        });

        // VIP Access button - Goes to Trading Dashboard
        vipBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            if (!username || !password) {
                showNotification('Introduce tus credenciales primero', 'error');
                return;
            }
            vipBtn.classList.add('loading');
            vipBtn.querySelector('span').textContent = 'Verificando VIP';
            targetSpeed = 5;
            try {
                const result = await doLogin(username, password);
                if (result.ok && result.role === 'admin') {
                    showNotification('¡Acceso VIP concedido! Bienvenido, Director 🦁', 'success');
                    setTimeout(() => { window.location.href = '/trading.html'; }, 1200);
                } else if (result.ok) {
                    showNotification('Acceso VIP requiere rol admin', 'error');
                    vipBtn.classList.remove('loading');
                    vipBtn.querySelector('span').textContent = '✨ Acceso VIP';
                } else {
                    vipBtn.classList.remove('loading');
                    vipBtn.querySelector('span').textContent = '✨ Acceso VIP';
                    showNotification('Credenciales inválidas', 'error');
                }
            } catch(e) {
                vipBtn.classList.remove('loading');
                vipBtn.querySelector('span').textContent = '✨ Acceso VIP';
                showNotification('Error de conexión', 'error');
            }
        });

        // Notification system
        function showNotification(message, type = 'info') {
            // Remove existing notifications
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%) translateY(-20px);
                background: ${type === 'success' ? 'rgba(34, 197, 94, 0.9)' : type === 'error' ? 'rgba(239, 68, 68, 0.9)' : 'rgba(59, 130, 246, 0.9)'};
                color: white;
                padding: 1rem 2rem;
                border-radius: 10px;
                font-weight: 600;
                z-index: 1000;
                backdrop-filter: blur(10px);
                border: 2px solid ${type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#3b82f6'};
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                animation: slideDown 0.5s ease-out forwards;
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.5s ease-out forwards';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }

        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                to {
                    transform: translateX(-50%) translateY(0);
                    opacity: 1;
                }
            }
            @keyframes slideUp {
                from {
                    transform: translateX(-50%) translateY(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(-50%) translateY(-20px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Focus on username field
        window.addEventListener('load', () => {
            usernameInput.focus();
        });

        // Enter key handling for VIP access (Shift+Enter)
        document.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === 'Enter') {
                e.preventDefault();
                vipBtn.click();
            }
        });

        // Easter egg: Konami code for instant VIP access
        let konamiCode = [];
        const konamiSequence = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        
        document.addEventListener('keydown', (e) => {
            konamiCode.push(e.key);
            konamiCode = konamiCode.slice(-10);
            
            if (konamiCode.join(',') === konamiSequence.join(',')) {
                showNotification('🎮 Código Konami activado! Acceso ilimitado concedido', 'success');
                targetSpeed = 10;
                setTimeout(() => {
                    window.location.href = '/trading.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
