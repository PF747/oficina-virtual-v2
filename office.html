<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>πφe Digital Twin - Oficina Virtual Infrastructure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            font-size: 4rem;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-text {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #f59e0b;
            letter-spacing: 0.2rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        /* HUD Top Bar */
        #hud-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 100%);
            border-bottom: 2px solid rgba(245, 158, 11, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .hud-logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f59e0b;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.8);
        }

        .hud-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            color: #f59e0b;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        .stat-value.online {
            color: #22c55e;
        }

        .stat-value.offline {
            color: #ef4444;
        }

        /* Device Info Panel */
        #device-info {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 320px;
            max-height: 500px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #f59e0b;
            border-radius: 8px;
            padding: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        #device-info.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .device-info-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #f59e0b;
        }

        .device-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .device-info-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .device-info-value {
            color: #fff;
            font-weight: bold;
        }

        /* HUD Bottom Bar */
        #hud-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem 2rem 2rem;
            background: linear-gradient(0deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 70%, transparent 100%);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .device-pills {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .device-pill {
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .device-pill::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .device-pill.online::before {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .device-pill.offline::before {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .device-pill:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 20px;
        }

        .device-pill.active {
            transform: scale(1.1);
        }

        /* FPS Counter */
        #fps-counter {
            position: fixed;
            top: 70px;
            left: 20px;
            background: rgba(10, 10, 10, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-size: 0.8rem;
            border: 1px solid rgba(245, 158, 11, 0.3);
            z-index: 100;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #hud-top {
                height: 50px;
                padding: 0 1rem;
            }

            .hud-logo {
                font-size: 1.2rem;
            }

            .hud-stats {
                gap: 1rem;
                font-size: 0.7rem;
            }

            .device-pills {
                gap: 0.5rem;
            }

            .device-pill {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }

            #device-info {
                width: calc(100% - 40px);
                right: 20px;
                max-height: 300px;
            }
        }
    </style>
</head>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">🦁 πφe</div>
        <div class="loading-text">CARGANDO GEMELO DIGITAL</div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container"></div>

    <!-- HUD Top Bar -->
    <div id="hud-top">
        <div class="hud-logo">🦁 πφe DIGITAL TWIN</div>
        <div class="hud-stats">
            <div class="stat-item">
                <div class="stat-label">DGX SPARKS</div>
                <div class="stat-value online" id="stat-dgx">●</div>
            </div>
            <div class="stat-item">

    <!-- HUD Bottom Bar -->
    <div id="hud-bottom">

    <!-- Device Info Panel -->

    <!-- FPS Counter -->
    <div id="fps-counter">FPS: <span id="fps-value">60</span></div>

    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <!-- Main Application -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==================== CONSTANTS ====================
        const DEVICES = {
            dgx: {
                id: 'dgx',
                name: 'DGX Sparks',
                emoji: '🖥️',
                ip: '192.168.1.152',
                position: [-2, 0.5, 2],
                color: 0x22c55e,
                type: 'server',
                status: 'online'
            },
            jetson: {
                id: 'jetson',
                name: 'Jetson Orin',
                emoji: '📷',
                ip: '192.168.1.137',
                position: [3, 0.3, 3],
                color: 0x3b82f6,
                type: 'edge',
                status: 'unknown'
            },
            antminer: {
                id: 'antminer',
                name: 'Antminer L7',
                emoji: '⚡',
                ip: '192.168.1.171',
                position: [-3, 0.5, -2],
                color: 0xeab308,
                type: 'miner',
                status: 'unknown'
            },
            macmini: {
                id: 'macmini',
                name: 'Mac Mini',
                emoji: '🖥️',
                ip: '192.168.1.158',
                position: [2, 0.2, -1],
                color: 0x94a3b8,
                type: 'kiosk',
                status: 'unknown'
            },
            router: {
                id: 'router',
                name: 'Router',
                emoji: '🌐',
                ip: '192.168.1.1',
                position: [0, 0.3, -3],
                color: 0x00ffff,
                type: 'network',
                status: 'online'
            },
            monitor: {
                id: 'monitor',
                name: 'MSI Monitor',
                emoji: '🖥️',
                ip: null,
                position: [2, 1.2, -1.5],
                color: 0x64748b,
                type: 'display',
                status: 'online'
            }
        };

        const AGENTS_DATA = [
            { name: 'Torrente', emoji: '🦁', role: 'Director', position: [0, 0, 4], color: 0xf59e0b },
            { name: 'Peter Goldman', emoji: '💰', role: 'Trader Sr.', position: [-4, 0, 0], color: 0xf97316 },
            { name: 'Hércules', emoji: '🛡️', role: 'Seguridad', position: [-3, 0, -3], color: 0x14b8a6 },
            { name: 'IA', emoji: '🧠', role: 'Jefe IA', position: [3, 0, 4], color: 0x3b82f6 }
        ];

        // ==================== SCENE SETUP ====================
        let scene, camera, renderer, composer;
        let controls;
        let deviceMeshes = {};
        let networkLines = [];
        let clock = new THREE.Clock();

        // FPS Counter
        let frameCount = 0;
        let lastFPSUpdate = 0;

        // Infrastructure status
        let infraStatus = {};

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(8, 6, 8);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 20;
            controls.minDistance = 3;
            controls.maxPolarAngle = Math.PI / 2.2;

            // Post-processing
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.8,
                0.4,
                0.85
            );
            composer.addPass(bloomPass);

            // Lighting
            createLighting();

            // Environment
            createOfficeRoom();
            createRackArea();

            // Infrastructure
            createDevices();
            createNetworkConnections();

            // Agents
            createAgents();

            // UI
            createDevicePills();
            setupDeviceInteraction();

            // Events
            window.addEventListener('resize', onWindowResize);

            // Start animation
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                animate();
                fetchInfraStatus();
                setInterval(fetchInfraStatus, 30000); // Update every 30s
            }, 500);
        }

        // ==================== LIGHTING ====================
        function createLighting() {
            // Ambient
            const ambient = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambient);

            // Main light (overhead)
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(5, 10, 5);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.1;
            mainLight.shadow.camera.far = 50;
            mainLight.shadow.camera.left = -10;
            mainLight.shadow.camera.right = 10;
            mainLight.shadow.camera.top = 10;
            mainLight.shadow.camera.bottom = -10;
            scene.add(mainLight);

            // Accent lights (neon edges)
            const accentPositions = [
                [-3, 2, -3],
                [3, 2, -3],
                [-3, 2, 3],
                [3, 2, 3]
            ];

            accentPositions.forEach((pos, i) => {
                const color = i % 2 === 0 ? 0xf59e0b : 0x00ffff;
                const light = new THREE.PointLight(color, 0.5, 8);
                light.position.set(...pos);
                scene.add(light);
            });
        }

        // ==================== OFFICE ROOM ====================
        function createOfficeRoom() {
            // Floor with grid
            const floorSize = 12;
            const floorGeometry = new THREE.PlaneGeometry(floorSize, floorSize);
            const floorMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                roughness: 0.8,
                metalness: 0.2
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid overlay
            const gridHelper = new THREE.GridHelper(floorSize, 20, 0xf59e0b, 0x444444);
            gridHelper.position.y = 0.01;
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Walls
            const wallMaterial = new THREE.MeshStandardMaterial({
                color: 0x0d0d1a,
                roughness: 0.9,
                metalness: 0.1
            });

            // Back wall
            const backWall = new THREE.Mesh(
                new THREE.PlaneGeometry(floorSize, 4),
                wallMaterial
            );
            backWall.position.set(0, 2, -floorSize / 2);
            backWall.receiveShadow = true;
            scene.add(backWall);

            // Left wall
            const leftWall = new THREE.Mesh(
                new THREE.PlaneGeometry(floorSize, 4),
                wallMaterial
            );
            leftWall.position.set(-floorSize / 2, 2, 0);
            leftWall.rotation.y = Math.PI / 2;
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            // Right wall
            const rightWall = new THREE.Mesh(
                new THREE.PlaneGeometry(floorSize, 4),
                wallMaterial
            );
            rightWall.position.set(floorSize / 2, 2, 0);
            rightWall.rotation.y = -Math.PI / 2;
            rightWall.receiveShadow = true;
            scene.add(rightWall);

            // Neon edge lighting (top edges)
            const neonMaterial = new THREE.MeshBasicMaterial({
                color: 0xf59e0b,
                transparent: true,
                opacity: 0.8
            });

            const edges = [
                [[-floorSize/2, 3.8, -floorSize/2], [floorSize/2, 3.8, -floorSize/2]],
                [[floorSize/2, 3.8, -floorSize/2], [floorSize/2, 3.8, floorSize/2]],
                [[-floorSize/2, 3.8, -floorSize/2], [-floorSize/2, 3.8, floorSize/2]]
            ];

            edges.forEach(([start, end]) => {
                const points = [new THREE.Vector3(...start), new THREE.Vector3(...end)];
                const geometry = new THREE.TubeGeometry(
                    new THREE.CatmullRomCurve3(points),
                    20,
                    0.05,
                    8,
                    false
                );
                const neon = new THREE.Mesh(geometry, neonMaterial);
                scene.add(neon);
            });
        }

        // ==================== RACK AREA ====================
        function createRackArea() {
            // Central desk/rack
            const deskGeometry = new THREE.BoxGeometry(3, 0.1, 2);
            const deskMaterial = new THREE.MeshStandardMaterial({
                color: 0x2a2a4e,
                metalness: 0.7,
                roughness: 0.3
            });
            const desk = new THREE.Mesh(deskGeometry, deskMaterial);
            desk.position.set(-1, 0.5, 1);
            desk.castShadow = true;
            desk.receiveShadow = true;
            scene.add(desk);

            // Desk legs
            const legGeometry = new THREE.BoxGeometry(0.1, 0.5, 0.1);
            const legMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.8,
                roughness: 0.2
            });

            const legPositions = [
                [-2.4, 0.25, 0.1],
                [0.4, 0.25, 0.1],
                [-2.4, 0.25, 1.9],
                [0.4, 0.25, 1.9]
            ];

            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeometry, legMaterial);
                leg.position.set(...pos);
                leg.castShadow = true;
                scene.add(leg);
            });
        }

        // ==================== DEVICES ====================
        function createDevices() {
            // DGX Sparks (server box)
            deviceMeshes.dgx = createDGXSparks();
            
            // Jetson Orin (small board with camera)
            deviceMeshes.jetson = createJetsonOrin();
            
            // Antminer L7 (miner with fans)
            deviceMeshes.antminer = createAntminerL7();
            
            // Mac Mini
            deviceMeshes.macmini = createMacMini();
            
            // Router
            deviceMeshes.router = createRouter();
            
            // Monitor
            deviceMeshes.monitor = createMonitor();
        }

        function createDGXSparks() {
            const group = new THREE.Group();
            const data = DEVICES.dgx;
            group.position.set(...data.position);

            // Server chassis (dark gray box)
            const chassisGeometry = new THREE.BoxGeometry(0.6, 0.4, 0.8);
            const chassisMaterial = new THREE.MeshStandardMaterial({
                color: 0x2a2a3a,
                metalness: 0.8,
                roughness: 0.3
            });
            const chassis = new THREE.Mesh(chassisGeometry, chassisMaterial);
            chassis.castShadow = true;
            chassis.receiveShadow = true;
            group.add(chassis);

            // Front panel with green LED
            const panelGeometry = new THREE.PlaneGeometry(0.58, 0.38);
            const panelMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a2a,
                metalness: 0.9,
                roughness: 0.2
            });
            const panel = new THREE.Mesh(panelGeometry, panelMaterial);
            panel.position.z = 0.401;
            group.add(panel);

            // Status LED (green)
            const ledGeometry = new THREE.CircleGeometry(0.03, 16);
            const ledMaterial = new THREE.MeshBasicMaterial({
                color: data.color,
                transparent: true,
                opacity: 0.9
            });
            const led = new THREE.Mesh(ledGeometry, ledMaterial);
            led.position.set(0.2, 0.1, 0.402);
            group.add(led);

            // LED glow
            const ledLight = new THREE.PointLight(data.color, 1, 2);
            ledLight.position.set(0.2, 0.1, 0.5);
            group.add(ledLight);

            // Label
            const label = createTextSprite(`${data.emoji} ${data.name}`, data.color);
            label.position.y = 0.6;
            group.add(label);

            group.userData = data;
            scene.add(group);
            return group;
        }

        function createJetsonOrin() {
            const group = new THREE.Group();
            const data = DEVICES.jetson;
            group.position.set(...data.position);

            // PCB board (green)
            const boardGeometry = new THREE.BoxGeometry(0.3, 0.02, 0.3);
            const boardMaterial = new THREE.MeshStandardMaterial({
                color: 0x2d5016,
                metalness: 0.3,
                roughness: 0.7
            });
            const board = new THREE.Mesh(boardGeometry, boardMaterial);
            board.castShadow = true;
            group.add(board);

            // Heatsink
            const heatsinkGeometry = new THREE.BoxGeometry(0.15, 0.06, 0.15);
            const heatsinkMaterial = new THREE.MeshStandardMaterial({
                color: 0x888888,
                metalness: 0.9,
                roughness: 0.2
            });
            const heatsink = new THREE.Mesh(heatsinkGeometry, heatsinkMaterial);
            heatsink.position.y = 0.04;
            group.add(heatsink);

            // Camera cone
            const cameraGeometry = new THREE.ConeGeometry(0.05, 0.15, 16);
            const cameraMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.7,
                roughness: 0.3
            });
            const camera = new THREE.Mesh(cameraGeometry, cameraMaterial);
            camera.position.set(0.1, 0.15, 0.1);
            camera.rotation.x = -Math.PI / 4;
            group.add(camera);

            // Camera lens (blue glow)
            const lensGeometry = new THREE.CircleGeometry(0.02, 16);
            const lensMaterial = new THREE.MeshBasicMaterial({
                color: data.color,
                transparent: true,
                opacity: 0.8
            });
            const lens = new THREE.Mesh(lensGeometry, lensMaterial);
            lens.position.set(0.1, 0.15, 0.18);
            lens.rotation.x = Math.PI / 4;
            group.add(lens);

            const lensLight = new THREE.PointLight(data.color, 0.5, 1);
            lensLight.position.set(0.1, 0.15, 0.2);
            group.add(lensLight);

            // Label
            const label = createTextSprite(`${data.emoji} ${data.name}`, data.color);
            label.position.y = 0.5;
            group.add(label);

            group.userData = data;
            scene.add(group);
            return group;
        }

        function createAntminerL7() {
            const group = new THREE.Group();
            const data = DEVICES.antminer;

        function createTextSprite(text, color) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;

            context.fillStyle = `#${new THREE.Color(color).getHexString()}`;
            context.font = 'Bold 36px Arial';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, 256, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 0.5, 1);

            return sprite;
        }

        // ==================== NETWORK CONNECTIONS ====================
        function createNetworkConnections() {
            const connections = [
                ['router', 'dgx', 0x22c55e],
                ['router', 'jetson', 0x3b82f6],
                ['router', 'antminer', 0xeab308],
                ['router', 'macmini', 0x94a3b8],
                ['macmini', 'monitor', 0x64748b]
            ];

            connections.forEach(([sourceId, targetId, color]) => {
                const source = deviceMeshes[sourceId];
                const target = deviceMeshes[targetId];
                if (!source || !target) return;

                // Create curved line
                const start = source.position.clone();
                const end = target.position.clone();
                const mid = new THREE.Vector3(
                    (start.x + end.x) / 2,
                    Math.max(start.y, end.y) + 0.5,
                    (start.z + end.z) / 2
                );

                const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
                const points = curve.getPoints(50);
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.4
                });
                const line = new THREE.Line(geometry, material);
                scene.add(line);

                // Animated particle
                const particleGeometry = new THREE.SphereGeometry(0.03, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.8
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                particle.userData.curve = curve;
                particle.userData.progress = Math.random();
                particle.userData.speed = 0.3 + Math.random() * 0.2;
                scene.add(particle);

                networkLines.push({ line, particle, sourceId, targetId, color });
            });
        }

        // ==================== UI FUNCTIONS ====================
        function createDevicePills() {
            const pillsContainer = document.getElementById('device-pills');
            Object.values(DEVICES).forEach(device => {
                const pill = document.createElement('div');
                pill.className = 'device-pill';
                pill.id = `pill-${device.id}`;
                pill.style.borderColor = `#${new THREE.Color(device.color).getHexString()}`;
                pill.style.color = `#${new THREE.Color(device.color).getHexString()}`;
                pill.innerHTML = `${device.emoji} ${device.name}`;
                
                pill.addEventListener('click', () => {
                    flyToDevice(device.id);
                    showDeviceInfo(device.id);
                    document.querySelectorAll('.device-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                });

                pill.addEventListener('mouseenter', () => {
                    pill.style.boxShadow = `0 5px 20px #${new THREE.Color(device.color).getHexString()}`;
                });

                pill.addEventListener('mouseleave', () => {
                    if (!pill.classList.contains('active')) {
                        pill.style.boxShadow = '';
                    }
                });

                pillsContainer.appendChild(pill);
            });
        }

        function setupDeviceInteraction() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('click', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const meshes = Object.values(deviceMeshes);
                const intersects = raycaster.intersectObjects(meshes, true);

                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while (obj.parent && !obj.parent.userData.id) {
                        obj = obj.parent;
                    }
                    const device = obj.parent.userData;
                    if (device && device.id) {
                        showDeviceInfo(device.id);
                    }
                }
            });

            // Close panel on click outside
            document.addEventListener('click', (event) => {
                if (!event.target.closest('#device-info') && 
                    !event.target.closest('.device-pill') &&
                    !event.target.closest('canvas')) {
                    document.getElementById('device-info').classList.remove('visible');
                }
            });
        }

        function showDeviceInfo(deviceId) {
            const device = DEVICES[deviceId];
            const status = infraStatus[deviceId] || {};

            document.getElementById('device-name').textContent = `${device.emoji} ${device.name}`;
            
            let detailsHTML = `
                <div class="device-info-row">
                    <span class="device-info-label">IP:</span>
                    <span class="device-info-value">${device.ip || 'N/A'}</span>
                </div>
                <div class="device-info-row">
                    <span class="device-info-label">Tipo:</span>
                    <span class="device-info-value">${device.type}</span>
                </div>
                <div class="device-info-row">
                    <span class="device-info-label">Estado:</span>
                    <span class="device-info-value" style="color: ${status.online ? '#22c55e' : '#ef4444'}">
                        ${status.online ? '● ONLINE' : '● OFFLINE'}
                    </span>
                </div>
            `;

            // Device-specific stats
            if (deviceId === 'dgx' && status.online) {
                if (status.gpu_temp) detailsHTML += `
                    <div class="device-info-row">
                        <span class="device-info-label">GPU Temp:</span>
                        <span class="device-info-value">${status.gpu_temp}°C</span>
                    </div>`;
                if (status.ram_percent) detailsHTML += `
                    <div class="device-info-row">
                        <span class="device-info-label">RAM:</span>
                        <span class="device-info-value">${status.ram_percent}%</span>
                    </div>`;
                if (status.disk_percent) detailsHTML += `
                    <div class="device-info-row">
                        <span class="device-info-label">Disco:</span>
                        <span class="device-info-value">${status.disk_percent}%</span>
                    </div>`;
            }

            if (deviceId === 'jetson' && status.online) {
                if (status.detections !== undefined) detailsHTML += `
                    <div class="device-info-row">
                        <span class="device-info-label">Detecciones:</span>
                        <span class="device-info-value">${status.detections}</span>
                    </div>`;
            }

            if (deviceId === 'antminer' && status.online) {
                if (status.hashrate) detailsHTML += `
                    <div class="device-info-row">
                        <span class="device-info-label">Hashrate:</span>
                        <span class="device-info-value">${status.hashrate} GH/s</span>
                    </div>`;
                if (status.temp) detailsHTML += `
                    <div class="device-info-row">
                        <span class="device-info-label">Temp:</span>
                        <span class="device-info-value">${status.temp}°C</span>
                    </div>`;
            }

            document.getElementById('device-details').innerHTML = detailsHTML;
            document.getElementById('device-info').classList.add('visible');
        }

        function flyToDevice(deviceId) {
            const device = deviceMeshes[deviceId];
            if (!device) return;

            const offset = new THREE.Vector3(2, 2, 2);
            const targetPos = device.position.clone().add(offset);

            // Smooth camera transition
            const duration = 1000;
            const startPos = camera.position.clone();
            const startTime = Date.now();

            function animateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeInOutCubic(progress);

                camera.position.lerpVectors(startPos, targetPos, eased);
                controls.target.copy(device.position);

                if (progress < 1) {
                    requestAnimationFrame(animateCamera);
                }
            }

            animateCamera();
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // ==================== INFRASTRUCTURE STATUS ====================
        async function fetchInfraStatus() {
            try {
                const response = await fetch('/api/infra/status');
                if (response.ok) {
                    const data = await response.json();
                    infraStatus = data;
                    updateDeviceVisuals();
                    updateHUDStats();
                }
            } catch (error) {
                console.error('Failed to fetch infrastructure status:', error);
            }
        }

        function updateDeviceVisuals() {
            Object.entries(infraStatus).forEach(([deviceId, status]) => {
                const device = deviceMeshes[deviceId];
                const pill = document.getElementById(`pill-${deviceId}`);
                
                if (device) {
                    // Update LED color based on status
                    const led = device.children.find(child => child.geometry?.type === 'CircleGeometry');
                    if (led) {
                        led.material.color.setHex(status.online ? DEVICES[deviceId].color : 0x666666);
                    }
                }

                if (pill) {
                    pill.classList.toggle('online', status.online);
                    pill.classList.toggle('offline', !status.online);
                }

                // Update network line colors
                networkLines.forEach(conn => {
                    if (conn.sourceId === deviceId || conn.targetId === deviceId) {
                        const sourceOnline = infraStatus[conn.sourceId]?.online;
                        const targetOnline = infraStatus[conn.targetId]?.online;
                        let color = 0x666666; // gray = down
                        if (sourceOnline && targetOnline) color = 0x22c55e; // green = healthy
                        else if (sourceOnline || targetOnline) color = 0xeab308; // yellow = degraded
                        
                        conn.line.material.color.setHex(color);
                        conn.particle.material.color.setHex(color);
                    }
                });
            });
        }

        function updateHUDStats() {
            // Update top HUD stats
            const dgxStat = document.getElementById('stat-dgx');
            const jetsonStat = document.getElementById('stat-jetson');
            const antminerStat = document.getElementById('stat-antminer');
            const networkStat = document.getElementById('stat-network');

            if (infraStatus.dgx) {
                dgxStat.textContent = '●';
                dgxStat.className = infraStatus.dgx.online ? 'stat-value online' : 'stat-value offline';
            }

            if (infraStatus.jetson) {
                jetsonStat.textContent = '●';
                jetsonStat.className = infraStatus.jetson.online ? 'stat-value online' : 'stat-value offline';
            }

            if (infraStatus.antminer) {
                antminerStat.textContent = infraStatus.antminer.hashrate ? 
                    `${infraStatus.antminer.hashrate} GH/s` : '●';
                antminerStat.className = infraStatus.antminer.online ? 'stat-value online' : 'stat-value offline';
            }

            // Network is online if router + at least one device is online
            const onlineCount = Object.values(infraStatus).filter(s => s.online).length;
            networkStat.className = onlineCount >= 2 ? 'stat-value online' : 'stat-value offline';
        }

        // ==================== ANIMATIONS ====================
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();

            // Animate miner fans
            if (deviceMeshes.antminer) {
                deviceMeshes.antminer.children.forEach(child => {
                    if (child.userData.rotationSpeed) {
                        child.rotation.z += delta * child.userData.rotationSpeed;
                    }
                });
            }

            // Animate network particles
            networkLines.forEach(conn => {
                if (conn.particle.userData.curve) {
                    conn.particle.userData.progress += delta * conn.particle.userData.speed;
                    if (conn.particle.userData.progress > 1) {
                        conn.particle.userData.progress = 0;
                    }
                    const point = conn.particle.userData.curve.getPoint(conn.particle.userData.progress);
                    conn.particle.position.copy(point);
                }
            });

            // Pulse LEDs
            Object.values(deviceMeshes).forEach(device => {
                const led = device.children.find(child => 
                    child.type === 'Mesh' && 
                    child.geometry?.type === 'CircleGeometry'
                );
                if (led) {
                    led.material.opacity = 0.7 + Math.sin(elapsedTime * 2) * 0.3;
                }
            });

            // Update controls
            controls.update();

            // Render
            composer.render();

            // FPS Counter
            frameCount++;
            const now = performance.now();
            if (now >= lastFPSUpdate + 1000) {
                document.getElementById('fps-value').textContent = frameCount;
                frameCount = 0;
                lastFPSUpdate = now;
            }
        }

        // ==================== WINDOW RESIZE ====================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==================== START ====================
        window.addEventListener('DOMContentLoaded', init);
    </script>
